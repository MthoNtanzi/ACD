<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashdown Community Development | Donate</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/donate.css">

</head>

<body>
    <nav>
        <div class="logo_donateBtn">
            <a href="index.html"><img class="logoImg" src="assets/logo.jpeg" alt="logo image"></a>
            <ul id="navMenu">
                <li><a class="navLinks" href="index.html">Home</a></li>
                <li><a class="navLinks" href="about.html">About Us</a></li>
                <li><a class="navLinks" href="sponsors.html">Our Sponsors</a></li>
                <li><a class="navLinks" href="donate.html">Get Involved</a></li>
                <li><a class="navLinks" href="contact.html">Contact</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle">
                ☰
            </div>
        </div>
    </nav>
    <main>
        <section>
            <form id="donationForm">
                <h2>Support Our Cause</h2>
                <label for="name">Name</label>
                <input type="text" placeholder="Full Name" id="name" required />
                <label for="email">Email</label>
                <input type="email" placeholder="Email" id="email" required />
                <label for="Amount">Amount</label>
                <input type="number" placeholder="Amount (ZAR)" required />
                <select name="donation" id="donation">
                    <option value="">Make this donation</option>
                    <option value="monthly">Monthly</option>
                    <option value="quartely">Quartely</option>
                    <option value="yearly">Yearly</option>
                </select>
                <button type="submit">Donate</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy;
            <script>document.write(new Date().getFullYear());</script> Ashdown Community Development
        </p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
